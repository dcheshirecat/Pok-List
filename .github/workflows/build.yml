name: Build Pokémon Tier List APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle ────────────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # ── 4. Keystore (ephemeral — generated fresh every build) ─────────────────
      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias pokemonkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass pokemon123 \
            -keypass  pokemon123 \
            -dname "CN=PokemonTierList, OU=App, O=Dev, L=City, ST=State, C=US"

      # ── 5. Scaffold entire Android project via Python ─────────────────────────
      - name: Create Android project structure
        run: |
          python3 << 'PYEOF'
          import os, shutil

          # ── Directory tree ────────────────────────────────────────────────────
          dirs = [
              'app/src/main/java/com/pokemon/tierlist',
              'app/src/main/res/values',
              'app/src/main/assets',
          ]
          for d in dirs:
              os.makedirs(d, exist_ok=True)

          # ── Copy index.html into assets ───────────────────────────────────────
          shutil.copy('index.html', 'app/src/main/assets/index.html')

          # ── settings.gradle ───────────────────────────────────────────────────
          with open('settings.gradle', 'w') as f:
              f.write("""\
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "PokemonTierList"
include ':app'
""")

          # ── Root build.gradle ─────────────────────────────────────────────────
          with open('build.gradle', 'w') as f:
              f.write("""\
plugins {
    id 'com.android.application' version '8.3.2' apply false
}
""")

          # ── app/build.gradle ──────────────────────────────────────────────────
          with open('app/build.gradle', 'w') as f:
              f.write("""\
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.pokemon.tierlist'
    compileSdk 34

    defaultConfig {
        applicationId "com.pokemon.tierlist"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile     file("../keystore.jks")
            storePassword "pokemon123"
            keyAlias      "pokemonkey"
            keyPassword   "pokemon123"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
""")

          # ── AndroidManifest.xml ───────────────────────────────────────────────
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write("""\
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">

    <uses-permission android:name="android.permission.INTERNET" />

    <application
        android:allowBackup="true"
        android:label="Pokémon Tier List"
        android:usesCleartextTraffic="true">

        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>

    </application>
</manifest>
""")

          # ── res/values/strings.xml ────────────────────────────────────────────
          with open('app/src/main/res/values/strings.xml', 'w') as f:
              f.write("""\
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">Pokémon Tier List</string>
</resources>
""")

          # ── MainActivity.java ─────────────────────────────────────────────────
          with open('app/src/main/java/com/pokemon/tierlist/MainActivity.java', 'w') as f:
              f.write("""\
package com.pokemon.tierlist;

import android.annotation.SuppressLint;
import android.app.Activity;
import android.content.ContentValues;
import android.graphics.Bitmap;
import android.graphics.BitmapFactory;
import android.net.Uri;
import android.os.Build;
import android.os.Bundle;
import android.os.Environment;
import android.provider.MediaStore;
import android.util.Base64;
import android.webkit.JavascriptInterface;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.widget.Toast;
import java.io.OutputStream;

public class MainActivity extends Activity {

    private WebView webView;

    @SuppressLint("SetJavaScriptEnabled")
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);

        webView = new WebView(this);
        setContentView(webView);

        WebSettings s = webView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setAllowFileAccess(true);
        s.setAllowUniversalAccessFromFileURLs(true);   // allows fetch() from file://
        s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
        s.setCacheMode(WebSettings.LOAD_DEFAULT);

        webView.addJavascriptInterface(new Bridge(), "Android");
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("file:///android_asset/index.html");
    }

    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) webView.goBack();
        else super.onBackPressed();
    }

    // ── JavaScript bridge ────────────────────────────────────────────────────
    class Bridge {

        @JavascriptInterface
        public boolean isAndroid() { return true; }

        @JavascriptInterface
        public void saveImage(String dataUrl) {
            try {
                // Strip the data:image/jpeg;base64, prefix
                String b64 = dataUrl.contains(",") ? dataUrl.split(",")[1] : dataUrl;
                byte[] bytes = Base64.decode(b64, Base64.DEFAULT);
                Bitmap bmp   = BitmapFactory.decodeByteArray(bytes, 0, bytes.length);

                String filename = "pokemon_tierlist_" + System.currentTimeMillis() + ".jpg";
                OutputStream out;

                // MediaStore (API 29+) — no storage permission required
                ContentValues values = new ContentValues();
                values.put(MediaStore.Images.Media.DISPLAY_NAME, filename);
                values.put(MediaStore.Images.Media.MIME_TYPE,    "image/jpeg");
                values.put(MediaStore.Images.Media.RELATIVE_PATH, Environment.DIRECTORY_PICTURES);
                Uri uri = getContentResolver().insert(
                        MediaStore.Images.Media.EXTERNAL_CONTENT_URI, values);
                out = getContentResolver().openOutputStream(uri);

                bmp.compress(Bitmap.CompressFormat.JPEG, 95, out);
                out.close();

                runOnUiThread(() ->
                    Toast.makeText(MainActivity.this,
                        "Saved to Pictures! 📸", Toast.LENGTH_LONG).show());

            } catch (Exception e) {
                runOnUiThread(() ->
                    Toast.makeText(MainActivity.this,
                        "Save failed: " + e.getMessage(), Toast.LENGTH_LONG).show());
            }
        }
    }
}
""")

          print("Android project scaffold complete.")
          PYEOF

      # ── 6. Build signed release APK ───────────────────────────────────────────
      - name: Build release APK
        run: gradle assembleRelease

      # ── 7. Upload artifact ────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-tier-list
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
