name: Build Pokémon Tier List APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Install Gradle 8.6 directly ───────────────────────────────────────
      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH

      # ── 4. Locate Android SDK (pre-installed on ubuntu-latest) ────────────────
      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      # ── 5. Accept SDK licences ────────────────────────────────────────────────
      - name: Accept Android SDK licences
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      # ── 6. Generate signing keystore ──────────────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias pokemonkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass pokemon123 \
            -keypass  pokemon123 \
            -dname "CN=PokemonTierList, OU=App, O=Dev, L=City, ST=State, C=US"

      # ── 7. Install Pillow for icon generation ─────────────────────────────────
      - name: Install Pillow
        run: pip install Pillow --quiet --break-system-packages

      # ── 8. Scaffold Android project + generate icon ───────────────────────────
      - name: Scaffold Android project
        shell: python3 {0}
        run: |
          import os, shutil, subprocess, math
          from PIL import Image, ImageDraw

          MIPMAP_SIZES = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }

          dirs = [
              'app/src/main/java/com/pokemon/tierlist',
              'app/src/main/res/values',
              'app/src/main/assets',
          ] + ['app/src/main/res/' + m for m in MIPMAP_SIZES]
          for d in dirs:
              os.makedirs(d, exist_ok=True)

          shutil.copy('index.html', 'app/src/main/assets/index.html')

          # ── Draw icon ─────────────────────────────────────────────────────────
          def draw_icon(size):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              d = ImageDraw.Draw(img)
              s = size
              pad = int(s * 0.04)
              r   = int(s * 0.22)
              # Deep navy rounded background
              d.rounded_rectangle([pad, pad, s-pad, s-pad], radius=r,
                                  fill=(13, 13, 26, 255))
              cx, cy = s / 2, s / 2
              br = s * 0.38
              # Pokeball top (red)
              d.pieslice([cx-br, cy-br, cx+br, cy+br], 180, 0,
                         fill=(220, 40, 40, 255))
              # Pokeball bottom (white)
              d.pieslice([cx-br, cy-br, cx+br, cy+br], 0, 180,
                         fill=(240, 240, 240, 255))
              # Centre band (black)
              bw = br * 0.18
              d.rectangle([cx-br, cy-bw, cx+br, cy+bw], fill=(20, 20, 20, 255))
              # Centre button
              cr = br * 0.22
              d.ellipse([cx-cr, cy-cr, cx+cr, cy+cr], fill=(20, 20, 20, 255))
              ir = cr * 0.55
              d.ellipse([cx-ir, cy-ir, cx+ir, cy+ir], fill=(240, 240, 240, 255))
              # Yellow sparkles
              star_color = (255, 204, 0, 220)
              def star(ox, oy, sr):
                  for i in range(4):
                      a = math.radians(i * 90)
                      b = math.radians(i * 90 + 45)
                      d.line([ox, oy,
                              ox + math.cos(a)*sr,
                              oy + math.sin(a)*sr],
                             fill=star_color, width=max(1, int(sr*0.22)))
                      d.line([ox, oy,
                              ox + math.cos(b)*sr*0.4,
                              oy + math.sin(b)*sr*0.4],
                             fill=star_color, width=max(1, int(sr*0.14)))
              m = s * 0.16
              star(m,         m,         s*0.07)
              star(s - m,     m,         s*0.05)
              star(s - m*0.8, s - m*0.8, s*0.06)
              return img

          for folder, size in MIPMAP_SIZES.items():
              draw_icon(size).save('app/src/main/res/' + folder + '/ic_launcher.png')

          print('Icons generated.')

          open('settings.gradle', 'w').write(
          'pluginManagement {\n'
          '    repositories {\n'
          '        google()\n'
          '        mavenCentral()\n'
          '        gradlePluginPortal()\n'
          '    }\n'
          '}\n'
          'dependencyResolutionManagement {\n'
          '    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n'
          '    repositories {\n'
          '        google()\n'
          '        mavenCentral()\n'
          '    }\n'
          '}\n'
          'rootProject.name = "PokemonTierList"\n'
          'include \':app\'\n'
          )

          open('build.gradle', 'w').write(
          'plugins {\n'
          '    id \'com.android.application\' version \'8.3.2\' apply false\n'
          '}\n'
          )

          open('gradle.properties', 'w').write(
          'org.gradle.jvmargs=-Xmx2048m\n'
          'android.useAndroidX=true\n'
          )

          sdk = subprocess.check_output(['bash', '-c', 'echo $ANDROID_HOME']).decode().strip()
          open('local.properties', 'w').write('sdk.dir=' + sdk + '\n')

          open('app/build.gradle', 'w').write(
          'plugins {\n'
          '    id \'com.android.application\'\n'
          '}\n'
          'android {\n'
          '    namespace \'com.pokemon.tierlist\'\n'
          '    compileSdk 34\n'
          '    defaultConfig {\n'
          '        applicationId "com.pokemon.tierlist"\n'
          '        minSdk 26\n'
          '        targetSdk 34\n'
          '        versionCode 1\n'
          '        versionName "1.0"\n'
          '    }\n'
          '    signingConfigs {\n'
          '        release {\n'
          '            storeFile     file("../keystore.jks")\n'
          '            storePassword "pokemon123"\n'
          '            keyAlias      "pokemonkey"\n'
          '            keyPassword   "pokemon123"\n'
          '        }\n'
          '    }\n'
          '    buildTypes {\n'
          '        release {\n'
          '            minifyEnabled false\n'
          '            signingConfig signingConfigs.release\n'
          '        }\n'
          '    }\n'
          '    compileOptions {\n'
          '        sourceCompatibility JavaVersion.VERSION_1_8\n'
          '        targetCompatibility JavaVersion.VERSION_1_8\n'
          '    }\n'
          '}\n'
          )

          open('app/src/main/AndroidManifest.xml', 'w').write(
          '<?xml version="1.0" encoding="utf-8"?>\n'
          '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
          '    <uses-permission android:name="android.permission.INTERNET" />\n'
          '    <application\n'
          '        android:allowBackup="true"\n'
          '        android:label="Pokemon Tier List"\n'
          '        android:icon="@mipmap/ic_launcher"\n'
          '        android:usesCleartextTraffic="true">\n'
          '        <activity\n'
          '            android:name=".MainActivity"\n'
          '            android:exported="true"\n'
          '            android:configChanges="orientation|screenSize|keyboardHidden">\n'
          '            <intent-filter>\n'
          '                <action android:name="android.intent.action.MAIN" />\n'
          '                <category android:name="android.intent.category.LAUNCHER" />\n'
          '            </intent-filter>\n'
          '        </activity>\n'
          '    </application>\n'
          '</manifest>\n'
          )

          open('app/src/main/res/values/strings.xml', 'w').write(
          '<?xml version="1.0" encoding="utf-8"?>\n'
          '<resources>\n'
          '    <string name="app_name">Pokemon Tier List</string>\n'
          '</resources>\n'
          )

          open('app/src/main/java/com/pokemon/tierlist/MainActivity.java', 'w').write(
          'package com.pokemon.tierlist;\n'
          'import android.annotation.SuppressLint;\n'
          'import android.app.Activity;\n'
          'import android.content.ContentValues;\n'
          'import android.graphics.Bitmap;\n'
          'import android.graphics.BitmapFactory;\n'
          'import android.net.Uri;\n'
          'import android.os.Bundle;\n'
          'import android.os.Environment;\n'
          'import android.provider.MediaStore;\n'
          'import android.util.Base64;\n'
          'import android.webkit.JavascriptInterface;\n'
          'import android.webkit.WebSettings;\n'
          'import android.webkit.WebView;\n'
          'import android.webkit.WebViewClient;\n'
          'import android.widget.Toast;\n'
          'import java.io.OutputStream;\n'
          'public class MainActivity extends Activity {\n'
          '    private WebView webView;\n'
          '    @SuppressLint("SetJavaScriptEnabled")\n'
          '    @Override\n'
          '    protected void onCreate(Bundle savedInstanceState) {\n'
          '        super.onCreate(savedInstanceState);\n'
          '        webView = new WebView(this);\n'
          '        setContentView(webView);\n'
          '        WebSettings s = webView.getSettings();\n'
          '        s.setJavaScriptEnabled(true);\n'
          '        s.setDomStorageEnabled(true);\n'
          '        s.setAllowFileAccess(true);\n'
          '        s.setAllowUniversalAccessFromFileURLs(true);\n'
          '        s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);\n'
          '        s.setCacheMode(WebSettings.LOAD_DEFAULT);\n'
          '        webView.addJavascriptInterface(new Bridge(), "Android");\n'
          '        webView.setWebViewClient(new WebViewClient());\n'
          '        webView.loadUrl("file:///android_asset/index.html");\n'
          '    }\n'
          '    @Override\n'
          '    public void onBackPressed() {\n'
          '        if (webView.canGoBack()) webView.goBack();\n'
          '        else super.onBackPressed();\n'
          '    }\n'
          '    class Bridge {\n'
          '        @JavascriptInterface\n'
          '        public boolean isAndroid() { return true; }\n'
          '        @JavascriptInterface\n'
          '        public void saveImage(String dataUrl) {\n'
          '            try {\n'
          '                String b64 = dataUrl.contains(",") ? dataUrl.split(",")[1] : dataUrl;\n'
          '                byte[] bytes = Base64.decode(b64, Base64.DEFAULT);\n'
          '                Bitmap bmp = BitmapFactory.decodeByteArray(bytes, 0, bytes.length);\n'
          '                String filename = "pokemon_tierlist_" + System.currentTimeMillis() + ".jpg";\n'
          '                ContentValues values = new ContentValues();\n'
          '                values.put(MediaStore.Images.Media.DISPLAY_NAME, filename);\n'
          '                values.put(MediaStore.Images.Media.MIME_TYPE, "image/jpeg");\n'
          '                values.put(MediaStore.Images.Media.RELATIVE_PATH, Environment.DIRECTORY_PICTURES);\n'
          '                Uri uri = getContentResolver().insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, values);\n'
          '                OutputStream out = getContentResolver().openOutputStream(uri);\n'
          '                bmp.compress(Bitmap.CompressFormat.JPEG, 95, out);\n'
          '                out.close();\n'
          '                runOnUiThread(() -> Toast.makeText(MainActivity.this, "Saved to Pictures!", Toast.LENGTH_LONG).show());\n'
          '            } catch (Exception e) {\n'
          '                runOnUiThread(() -> Toast.makeText(MainActivity.this, "Save failed: " + e.getMessage(), Toast.LENGTH_LONG).show());\n'
          '            }\n'
          '        }\n'
          '    }\n'
          '}\n'
          )

          print("Scaffold complete.")

      # ── 9. Build signed release APK ───────────────────────────────────────────
      - name: Build release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      # ── 10. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-tier-list
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
